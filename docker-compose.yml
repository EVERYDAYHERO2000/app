version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bulk-cargo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bulk_cargo
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
